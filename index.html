<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Display</title>
    <style>
        /* デフォルト設定（JavaScriptで上書きされます） */
        :root {
            --bg-color: #0b132b; /* 紺色 */
            --main-color: #ff8c00; /* オレンジ */
            --font-en: 'Arial', sans-serif;
            --font-ja: 'Meiryo', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: var(--font-en), var(--font-ja); /* 数字/英語優先、日本語フォント */
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr auto;
        }

        /* --- カーテンアニメーションの基盤 --- */
        .curtain-container {
            position: relative;
            overflow: hidden;
            padding: 20px;
        }
        .curtain {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background-color: var(--main-color);
            z-index: 10;
        }
        @keyframes sweep {
            0% { left: -100%; }
            50% { left: 0; }
            100% { left: 100%; }
        }

        /* --- 各ウィジェットの配置 --- */
        #clock-widget {
            grid-column: 1;
            grid-row: 1;
        }
        .time-large { font-size: 6rem; font-weight: bold; line-height: 1; margin: 0; }
        .date-small { font-size: 1.5rem; color: var(--main-color); margin-top: 5px; }

        #weather-widget {
            grid-column: 2;
            grid-row: 1;
            text-align: right;
            font-size: 1.5rem;
        }

        #news-widget {
            grid-column: 1 / span 2;
            grid-row: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            text-align: center;
            padding: 0 40px;
        }

        #calendar-widget {
            position: absolute;
            top: 40%;
            left: 20px;
            font-size: 1.5rem;
        }

        /* --- タイマーと設定（画面下部） --- */
        #bottom-bar {
            grid-column: 1 / span 2;
            grid-row: 3;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 20px;
            height: 100px;
        }

        #timer-display-area {
            font-size: 3rem;
            color: var(--main-color);
            flex-grow: 1;
        }

        #controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            background-color: var(--main-color);
            color: var(--bg-color);
            border: none;
            padding: 10px 20px;
            font-size: 1.2rem;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }

        /* --- 設定モーダル --- */
        #settings-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .settings-content {
            background: var(--bg-color);
            padding: 30px;
            border: 2px solid var(--main-color);
            border-radius: 10px;
            width: 80%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .settings-content label {
            display: block; margin-top: 15px; color: var(--main-color); font-size: 1.2rem;
        }
        .settings-content input {
            width: 100%; padding: 8px; margin-top: 5px; font-size: 1rem; box-sizing: border-box;
        }
        .settings-actions { margin-top: 30px; display: flex; justify-content: space-between; }
        .danger-btn { background-color: #ff4444; color: white; }

        /* タイマー設定UI */
        #timer-setup {
            display: none;
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: var(--bg-color);
            border: 2px solid var(--main-color);
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="clock-widget" class="curtain-container">
        <div class="curtain"></div>
        <div id="clock-content">
            <p class="time-large" id="time-text">00:00:00</p>
            <p class="date-small" id="date-text">----/--/-- (-)</p>
        </div>
    </div>

    <div id="calendar-widget" class="curtain-container">
        <div class="curtain"></div>
        <div id="calendar-content">予定がありません</div>
    </div>

    <div id="weather-widget" class="curtain-container">
        <div class="curtain"></div>
        <div id="weather-content">天気を取得中...</div>
    </div>

    <div id="news-widget" class="curtain-container">
        <div class="curtain"></div>
        <div id="news-content">ニュースを取得中...</div>
    </div>

    <div id="bottom-bar">
        <div id="timer-display-area" class="curtain-container">
            <div class="curtain" id="timer-curtain"></div>
            <div id="timer-content"></div>
        </div>

        <div id="controls">
            <div id="timer-setup">
                <input type="number" id="timer-minutes" placeholder="分" style="width: 60px;"> 分
                <span>または</span>
                <input type="time" id="timer-time"> まで
                <button onclick="startTimer()">開始</button>
                <button onclick="stopTimer()" class="danger-btn">停止</button>
            </div>
            <button onclick="toggleTimerSetup()">⏱ タイマー</button>
            <button onclick="openSettings()">⚙ 設定</button>
        </div>
    </div>

    <div id="settings-modal">
        <div class="settings-content">
            <h2 style="color: var(--main-color);">スマートディスプレイ設定</h2>
            
            <label>メインカラー</label>
            <input type="color" id="set-color" value="#ff8c00">

            <label>英語/数字フォント (例: Arial, 'Times New Roman')</label>
            <input type="text" id="set-font-en" value="Arial">

            <label>日本語フォント (例: Meiryo, 'Noto Sans JP')</label>
            <input type="text" id="set-font-ja" value="Meiryo">

            <label>ニュースRSS URL (Yahoo等をCORS経由で)</label>
            <input type="text" id="set-rss" value="https://news.yahoo.co.jp/rss/topics/top-picks.xml">

            <label>天気：緯度 (Latitude)</label>
            <input type="number" id="set-lat" step="0.0001" value="35.6895">
            
            <label>天気：経度 (Longitude)</label>
            <input type="number" id="set-lon" step="0.0001" value="139.6917">

            <label>カレンダー：予定名</label>
            <input type="text" id="set-event-name" placeholder="例: 東京旅行">

            <label>カレンダー：日時</label>
            <input type="datetime-local" id="set-event-date">

            <div class="settings-actions">
                <button class="danger-btn" onclick="resetAll()">全リセット</button>
                <div>
                    <button onclick="closeSettings()" style="background:gray;">キャンセル</button>
                    <button onclick="saveSettings()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* =========================================
           状態・設定管理 (LocalStorage)
        ========================================= */
        const defaultSettings = {
            mainColor: '#ff8c00', fontEn: 'Arial', fontJa: 'Meiryo',
            rssUrl: 'https://news.yahoo.co.jp/rss/topics/top-picks.xml',
            lat: 35.6895, lon: 139.6917, // 東京
            eventName: '', eventDate: '',
            timerTarget: null // タイマー終了時刻のタイムスタンプ
        };

        let config = { ...defaultSettings };
        let newsList = [];
        let weatherData = null;
        let weatherMode = 0; // 0: 今日の天気, 1: 5日間, 2: 注意報(モック)
        let newsIndex = 0;

        function loadConfig() {
            const saved = localStorage.getItem('smartDisplaySettings');
            if (saved) {
                config = { ...config, ...JSON.parse(saved) };
            }
            applyConfig();
        }

        function saveConfig() {
            localStorage.setItem('smartDisplaySettings', JSON.stringify(config));
        }

        function applyConfig() {
            document.documentElement.style.setProperty('--main-color', config.mainColor);
            document.documentElement.style.setProperty('--font-en', config.fontEn);
            document.documentElement.style.setProperty('--font-ja', config.fontJa);
        }

        /* =========================================
           カーテンアニメーション制御
        ========================================= */
        function triggerCurtain(containerId, updateFunction) {
            const container = document.getElementById(containerId);
            const curtain = container.querySelector('.curtain');
            
            // アニメーションのリセット
            curtain.style.animation = 'none';
            void curtain.offsetWidth; // リフローを強制
            
            // アニメーション開始 (1秒で通過)
            curtain.style.animation = 'sweep 1.2s ease-in-out forwards';
            
            // カーテンが画面を覆い隠したタイミング(約0.6秒後)で中身を書き換える
            setTimeout(() => {
                if(updateFunction) updateFunction();
            }, 600);
        }

        /* =========================================
           時計機能
        ========================================= */
        function updateClock() {
            const now = new Date();
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            
            const yyyy = now.getFullYear();
            const mo = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const day = days[now.getDay()];

            document.getElementById('time-text').innerText = `${hh}:${mm}:${ss}`;
            document.getElementById('date-text').innerText = `${yyyy}/${mo}/${dd} (${day})`;
        }
        setInterval(updateClock, 1000);

        /* =========================================
           カレンダー（カウントダウン）
        ========================================= */
        function updateCalendar() {
            if (!config.eventDate || !config.eventName) {
                document.getElementById('calendar-content').innerHTML = "";
                return;
            }
            const target = new Date(config.eventDate).getTime();
            const now = new Date().getTime();
            const diff = target - now;

            if (diff > 0) {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('calendar-content').innerHTML = 
                    `<span style="color:var(--main-color)">${config.eventName}</span> まで<br>${d}日と${h}時間`;
            } else {
                document.getElementById('calendar-content').innerHTML = 
                    `<span style="color:var(--main-color)">${config.eventName}</span> は終了しました`;
            }
        }
        setInterval(updateCalendar, 1000 * 60 * 60); // 1時間ごとに更新

        /* =========================================
           タイマー機能（バックグラウンド継続）
        ========================================= */
        let timerInterval;

        function toggleTimerSetup() {
            const setup = document.getElementById('timer-setup');
            setup.style.display = setup.style.display === 'block' ? 'none' : 'block';
        }

        function startTimer() {
            const mins = document.getElementById('timer-minutes').value;
            const timeVal = document.getElementById('timer-time').value;
            let targetMs = 0;

            if (mins) {
                targetMs = Date.now() + (parseInt(mins) * 60000);
            } else if (timeVal) {
                const now = new Date();
                const [h, m] = timeVal.split(':');
                const targetDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
                if (targetDate.getTime() < now.getTime()) {
                    targetDate.setDate(targetDate.getDate() + 1); // 翌日
                }
                targetMs = targetDate.getTime();
            } else {
                return;
            }

            config.timerTarget = targetMs;
            saveConfig();
            document.getElementById('timer-setup').style.display = 'none';
            
            // タイマーエリア出現のカーテンアニメーション
            triggerCurtain('timer-display-area', () => {
                runTimerLogic();
            });
        }

        function stopTimer() {
            config.timerTarget = null;
            saveConfig();
            clearInterval(timerInterval);
            triggerCurtain('timer-display-area', () => {
                document.getElementById('timer-content').innerHTML = ""; // 空白に戻す
            });
            document.getElementById('timer-setup').style.display = 'none';
        }

        function runTimerLogic() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!config.timerTarget) return;

                const diff = config.timerTarget - Date.now();
                if (diff <= 0) {
                    document.getElementById('timer-content').innerText = "時間です！";
                    clearInterval(timerInterval);
                    config.timerTarget = null;
                    saveConfig();
                } else {
                    const h = Math.floor(diff / (1000 * 60 * 60));
                    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((diff % (1000 * 60)) / 1000);
                    let text = `⏱ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                    if(h > 0) text = `⏱ ${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                    document.getElementById('timer-content').innerText = text;
                }
            }, 1000);
        }

        /* =========================================
           ニュース取得 (5分毎更新、60秒毎切替)
        ========================================= */
        async function fetchNews() {
            try {
                // RSSをフロントエンドで取得するため、CORSプロキシ(allorigins)を利用
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(config.rssUrl)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");
                
                newsList = [];
                // 必ず15件取得（足りない場合はある分だけ）
                for (let i = 0; i < Math.min(items.length, 15); i++) {
                    newsList.push(items[i].querySelector("title").textContent);
                }
            } catch (error) {
                console.error("News fetch error:", error);
                newsList = ["ニュースの取得に失敗しました。RSSのURLを確認してください。"];
            }
        }

        function cycleNews() {
            if (newsList.length === 0) return;
            triggerCurtain('news-widget', () => {
                document.getElementById('news-content').innerText = newsList[newsIndex];
                newsIndex = (newsIndex + 1) % newsList.length;
            });
        }

        /* =========================================
           天気取得 (5分毎更新、30秒毎切替)
        ========================================= */
        async function fetchWeather() {
            try {
                // Open-Meteo APIを利用 (APIキー不要)
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${config.lat}&longitude=${config.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&current_weather=true&timezone=Asia%2FTokyo`;
                const response = await fetch(url);
                weatherData = await response.json();
            } catch (error) {
                console.error("Weather fetch error:", error);
            }
        }

        function wCodeToStr(code) {
            if(code <= 3) return "晴/曇";
            if(code <= 49) return "霧";
            if(code <= 69) return "雨";
            if(code <= 79) return "雪";
            if(code <= 99) return "雷雨";
            return "不明";
        }

        function cycleWeather() {
            if (!weatherData) return;
            
            triggerCurtain('weather-widget', () => {
                const content = document.getElementById('weather-content');
                
                if (weatherMode === 0) {
                    // 今日の天気
                    const cw = weatherData.current_weather;
                    content.innerHTML = `現在: ${cw.temperature}°C<br>${wCodeToStr(cw.weathercode)}`;
                } else if (weatherMode === 1) {
                    // 5日間 (簡略化のため明日、明後日の2日間表示)
                    const daily = weatherData.daily;
                    content.innerHTML = `<span style="font-size:1rem;">
                        明日: ${daily.temperature_2m_max[1]}°C / ${daily.temperature_2m_min[1]}°C<br>
                        明後日: ${daily.temperature_2m_max[2]}°C / ${daily.temperature_2m_min[2]}°C
                    </span>`;
                } else {
                    // 注意報 (Open-Meteoは日本の注意報を出さないためダミーまたは風速)
                    const cw = weatherData.current_weather;
                    content.innerHTML = `<span style="font-size:1rem; color:var(--main-color);">
                        風速: ${cw.windspeed} km/h<br>特別な気象警報は取得されていません
                    </span>`;
                }
                
                weatherMode = (weatherMode + 1) % 3;
            });
        }

        /* =========================================
           設定モーダルの制御
        ========================================= */
        function openSettings() {
            document.getElementById('set-color').value = config.mainColor;
            document.getElementById('set-font-en').value = config.fontEn;
            document.getElementById('set-font-ja').value = config.fontJa;
            document.getElementById('set-rss').value = config.rssUrl;
            document.getElementById('set-lat').value = config.lat;
            document.getElementById('set-lon').value = config.lon;
            document.getElementById('set-event-name').value = config.eventName || '';
            document.getElementById('set-event-date').value = config.eventDate || '';
            
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        function saveSettings() {
            config.mainColor = document.getElementById('set-color').value;
            config.fontEn = document.getElementById('set-font-en').value;
            config.fontJa = document.getElementById('set-font-ja').value;
            config.rssUrl = document.getElementById('set-rss').value;
            config.lat = parseFloat(document.getElementById('set-lat').value);
            config.lon = parseFloat(document.getElementById('set-lon').value);
            config.eventName = document.getElementById('set-event-name').value;
            config.eventDate = document.getElementById('set-event-date').value;

            saveConfig();
            applyConfig();
            closeSettings();
            
            // 即時反映のために再取得・再描画
            updateCalendar();
            fetchWeather().then(cycleWeather);
            fetchNews().then(cycleNews);
        }

        function resetAll() {
            if(confirm("すべての設定と情報を初期化しますか？")) {
                localStorage.removeItem('smartDisplaySettings');
                location.reload(); // ページをリロードして初期状態に
            }
        }

        /* =========================================
           初期化とタイマーループ
        ========================================= */
        window.onload = async () => {
            loadConfig();
            updateClock();
            updateCalendar();
            
            // 初回データ取得
            await fetchNews();
            await fetchWeather();
            
            // 初回表示（カーテンアニメーションを伴う）
            cycleNews();
            cycleWeather();
            
            // もしリロード前にタイマーが動いていたら再開
            if (config.timerTarget && config.timerTarget > Date.now()) {
                document.getElementById('timer-content').innerText = "復元中...";
                runTimerLogic();
            }

            // ループ設定
            setInterval(cycleWeather, 30000); // 天気アニメーション 30秒毎
            setInterval(cycleNews, 60000);    // ニュースアニメーション 60秒毎
            
            setInterval(fetchWeather, 5 * 60 * 1000); // 天気データ更新 5分毎
            setInterval(fetchNews, 5 * 60 * 1000);    // ニュースデータ更新 5分毎
        };
    </script>
</body>
</html>
