<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0b132b">
    <link rel="manifest" href='data:application/manifest+json;charset=utf-8,{"name":"Smart Display","short_name":"Display","display":"standalone","background_color":"#0b132b","theme_color":"#0b132b"}'>
    
    <title>Modern Smart Display V4</title>
    <style>
        /* --- ユーザー指定フォントの読み込み --- */
        @font-face {
            font-family: 'WRCCleanBold';
            src: url('WRCCleanBold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }
        @font-face {
            font-family: 'GenEiLateGop_v2';
            src: url('GenEiLateGoP_v2.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* --- Default Variables --- */
        :root {
            --bg-color: #0b132b;
            --main-color: #ff8c00;
            --font-main: 'WRCCleanBold', 'GenEiLateGop_v2', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top left, #1a2a50, var(--bg-color));
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #ffffff;
            font-family: var(--font-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-shadow: 0px 2px 10px rgba(0,0,0,0.5);
            /* スマホでのテキスト選択などを防止してアプリ感アップ */
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- Global Curtain Animation --- */
        .curtain-container {
            position: relative;
            overflow: hidden;
            border-radius: inherit;
        }
        .curtain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--main-color);
            z-index: 50;
            transform: translateX(-101%);
        }
        @keyframes sweep {
            0% { transform: translateX(-101%); }
            40% { transform: translateX(0); }
            60% { transform: translateX(0); }
            100% { transform: translateX(101%); }
        }

        /* --- グラスモーフィズム --- */
        .widget-card {
            background: rgba(10, 15, 30, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 2vw;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .widget-title {
            position: absolute;
            top: 20px;
            left: 25px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            font-family: 'WRCCleanBold', sans-serif;
            text-shadow: none;
        }

        /* --- Header (Clock & Weather) --- */
        .header {
            padding: 2vw 4vw 1vw 4vw;
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            gap: 3vw;
            height: 25vh;
            box-sizing: border-box;
        }
        
        #clock-widget {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .time-large {
            font-size: 7.5rem;
            line-height: 0.85;
            margin: 0;
            letter-spacing: -2px;
        }
        .date-small {
            font-size: 1.5rem;
            color: var(--main-color);
            margin: 15px 0 0 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #weather-widget {
            flex: 1;
            text-align: center;
        }
        #weather-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .forecast-container {
            display: flex;
            justify-content: space-between;
            width: 90%;
            margin-top: 10px;
        }
        .forecast-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Main Widgets (Calendar & News) --- */
        .widgets-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 3vw;
            padding: 0 4vw;
            height: 40vh;
            box-sizing: border-box;
        }

        .widget-content {
            font-size: 2rem;
            line-height: 1.4;
            width: 100%;
            text-align: center;
        }

        #news-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            text-align: left;
        }
        #news-text {
            flex: 1;
            font-size: 2.2rem;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            padding-right: 30px;
        }
        #news-qr-container {
            width: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.8);
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-shadow: none;
            color: #000;
        }
        #news-qr-container img {
            width: 140px;
            height: 140px;
            border-radius: 5px;
        }
        #news-qr-container span {
            font-size: 0.8rem;
            margin-top: 8px;
            font-family: 'GenEiLateGop_v2', sans-serif;
            font-weight: bold;
        }

        .highlight {
            color: var(--main-color);
        }

        /* --- Footer (Timer & Controls) --- */
        .footer {
            padding: 1vw 4vw 2vw 4vw;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            height: 15vh;
            box-sizing: border-box;
        }

        /* タイマー表示エリアとプログレスバー */
        #timer-display-area {
            min-width: 350px;
            width: 400px;
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #timer-text-container {
            font-size: 4.5rem;
            color: var(--main-color);
            line-height: 1;
            margin-bottom: 10px;
            text-align: left;
        }
        #timer-progress-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
            display: none; /* 初期状態は非表示 */
        }
        #timer-progress-fill {
            height: 100%;
            width: 100%;
            background: var(--main-color);
            transition: width 1s linear;
            box-shadow: 0 0 10px var(--main-color);
        }

        /* 終了時のパルスアニメーション */
        @keyframes pulseGlow {
            0% { text-shadow: 0 0 10px var(--main-color); opacity: 1; }
            50% { text-shadow: 0 0 40px var(--main-color), 0 0 20px #fff; opacity: 0.8; transform: scale(1.02); }
            100% { text-shadow: 0 0 10px var(--main-color); opacity: 1; }
        }
        .timer-finished {
            animation: pulseGlow 1.5s infinite ease-in-out;
            color: #fff !important;
        }

        .controls {
            display: flex;
            gap: 15px;
            position: relative;
        }

        button {
            background-color: rgba(0, 0, 0, 0.5);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        button:hover {
            background-color: var(--main-color);
            border-color: var(--main-color);
            color: var(--bg-color);
        }
        .btn-primary {
            background-color: var(--main-color);
            border-color: var(--main-color);
            color: var(--bg-color);
        }

        /* --- Timer Setup Modal --- */
        #timer-setup {
            display: none;
            position: absolute;
            bottom: 70px;
            right: 0;
            background: rgba(11, 19, 43, 0.85);
            border: 1px solid var(--main-color);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            min-width: 250px;
        }
        .timer-row {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        input[type="number"], input[type="time"], input[type="text"], input[type="datetime-local"] {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: var(--main-color);
        }

        /* --- Settings Modal --- */
        #settings-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .settings-content {
            background: rgba(11, 19, 43, 0.9);
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid var(--main-color);
            border-radius: 20px;
            width: 80%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }
        .settings-content h2 { margin-top: 0; font-weight: normal; }
        .settings-content label {
            display: block; margin-top: 20px; color: rgba(255, 255, 255, 0.8); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
        }
        .settings-content input { width: 100%; margin-top: 8px; box-sizing: border-box; }
        .settings-actions { margin-top: 40px; display: flex; justify-content: space-between; }
        .btn-danger { border-color: #ff4444; color: #ff4444; }
        .btn-danger:hover { background-color: #ff4444; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <div id="clock-widget">
            <div id="clock-content">
                <p class="time-large" id="time-text">00:00:00</p>
                <p class="date-small" id="date-text">Month 00, YYYY (Day)</p>
            </div>
        </div>

        <div id="weather-widget" class="widget-card curtain-container">
            <div class="widget-title">Weather</div>
            <div class="curtain"></div>
            <div id="weather-content">取得中...</div>
        </div>
    </div>

    <div class="widgets-grid">
        <div id="calendar-widget" class="widget-card curtain-container">
            <div class="widget-title">Calendar</div>
            <div class="curtain"></div>
            <div id="calendar-content" class="widget-content">Loading...</div>
        </div>

        <div id="news-widget" class="widget-card curtain-container">
            <div class="widget-title">News</div>
            <div class="curtain"></div>
            <div id="news-content">
                <div id="news-text">ニュースを取得中...</div>
                <div id="news-qr-container" style="visibility: hidden;">
                    <img id="news-qr-img" src="" alt="QR Code">
                    <span>続きはQRコードから</span>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        
        <div id="timer-display-area" class="curtain-container">
            <div class="curtain" id="timer-curtain"></div>
            <div id="timer-text-container"></div>
            <div id="timer-progress-bg">
                <div id="timer-progress-fill"></div>
            </div>
        </div>

        <div class="controls">
            <div id="timer-setup">
                <div class="timer-row">
                    <input type="number" id="timer-minutes" placeholder="0" style="width: 70px;"> 
                    <span>分 (Mins)</span>
                </div>
                <div class="timer-row" style="justify-content: center; font-size: 0.9rem; color: #888;">
                    - または時刻指定 -
                </div>
                <div class="timer-row">
                    <input type="time" id="timer-time" style="width: 100%;">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn-primary" onclick="startTimer()" style="flex:1;">Start</button>
                    <button class="btn-danger" onclick="stopTimer()" style="flex:1;">Stop</button>
                </div>
            </div>

            <button onclick="toggleTimerSetup()">Timer</button>
            <button onclick="openSettings()">Settings</button>
        </div>
    </div>

    <div id="settings-modal">
        <div class="settings-content">
            <h2><span class="highlight">System</span> Settings</h2>
            
            <label>Main Theme Color</label>
            <input type="color" id="set-color" value="#ff8c00" style="height: 40px; padding: 0; border: none; background: none; cursor: pointer;">

            <label>背景画像URL (画像のアドレスを入力 / 空欄でデフォルト)</label>
            <input type="text" id="set-bg-url" placeholder="https://example.com/image.jpg">

            <label>News RSS URL</label>
            <input type="text" id="set-rss" value="https://news.yahoo.co.jp/rss/topics/top-picks.xml">

            <div style="display: flex; gap: 20px;">
                <div style="flex: 1;">
                    <label>Weather Latitude (緯度)</label>
                    <input type="number" id="set-lat" step="0.0001" value="35.6895">
                </div>
                <div style="flex: 1;">
                    <label>Weather Longitude (経度)</label>
                    <input type="number" id="set-lon" step="0.0001" value="139.6917">
                </div>
            </div>

            <label>Countdown Event Name (予定名)</label>
            <input type="text" id="set-event-name" placeholder="例: 東京旅行">

            <label>Countdown Event Date & Time (日時)</label>
            <input type="datetime-local" id="set-event-date">

            <div class="settings-actions">
                <button class="btn-danger" onclick="resetAll()">全設定リセット</button>
                <div style="display: flex; gap: 10px;">
                    <button onclick="closeSettings()">Cancel</button>
                    <button class="btn-primary" onclick="saveSettings()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const defaultSettings = {
            mainColor: '#ff8c00', 
            bgUrl: '', 
            rssUrl: 'https://news.yahoo.co.jp/rss/topics/top-picks.xml',
            lat: 35.6895, lon: 139.6917, 
            eventName: '', eventDate: '',
            timerTarget: null,
            timerTotalMs: 0 // プログレスバー計算用にセットした総時間を保存
        };

        let config = { ...defaultSettings };
        let newsList = []; 
        let weatherData = null;
        let weatherMode = 0; 
        let newsIndex = 0;

        function loadConfig() {
            const saved = localStorage.getItem('smartDisplaySettingsV4');
            if (saved) config = { ...config, ...JSON.parse(saved) };
            applyConfig();
        }

        function saveConfig() {
            localStorage.setItem('smartDisplaySettingsV4', JSON.stringify(config));
        }

        function applyConfig() {
            document.documentElement.style.setProperty('--main-color', config.mainColor);
            if (config.bgUrl) {
                document.body.style.backgroundImage = `url('${config.bgUrl}')`;
            } else {
                document.body.style.backgroundImage = ''; 
            }
        }

        function triggerCurtain(containerId, updateFunction) {
            const container = document.getElementById(containerId);
            const curtain = container.querySelector('.curtain');
            
            curtain.style.animation = 'none';
            void curtain.offsetWidth; 
            curtain.style.animation = 'sweep 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards';
            
            setTimeout(() => {
                if(updateFunction) updateFunction();
            }, 550);
        }

        /* ==================== Clock ==================== */
        function updateClock() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            
            const options = { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' };
            const dateString = now.toLocaleDateString('en-US', options);

            document.getElementById('time-text').innerText = `${hh}:${mm}:${ss}`;
            document.getElementById('date-text').innerText = dateString;
        }
        setInterval(updateClock, 1000);

        /* ==================== Calendar ==================== */
        function updateCalendar() {
            const content = document.getElementById('calendar-content');
            if (!config.eventDate || !config.eventName) {
                content.innerHTML = `<span style="font-size: 1.5rem; color: #ccc;">予定がありません</span>`;
                return;
            }
            const target = new Date(config.eventDate).getTime();
            const now = new Date().getTime();
            const diff = target - now;

            if (diff > 0) {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                content.innerHTML = 
                    `<div style="font-size: 1.2rem; margin-bottom: 15px; color: #ddd;">
                        <span class="highlight" style="font-size: 1.8rem;">${config.eventName}</span> まで
                     </div>
                     <div style="font-size: 3.5rem; font-family: 'WRCCleanBold';">
                        ${d} <span style="font-size: 1.5rem; color: #ccc; font-family: 'GenEiLateGop_v2';">日</span> 
                        ${h} <span style="font-size: 1.5rem; color: #ccc; font-family: 'GenEiLateGop_v2';">時間</span>
                     </div>`;
            } else {
                content.innerHTML = 
                    `<span class="highlight" style="font-size: 2rem;">${config.eventName}</span><br>
                     <span style="font-size: 1.5rem;">時間が来ました！</span>`;
            }
        }
        setInterval(updateCalendar, 1000 * 60 * 60);

        /* ==================== Timer (Animation Enhanced) ==================== */
        let timerInterval;

        function toggleTimerSetup() {
            const setup = document.getElementById('timer-setup');
            setup.style.display = setup.style.display === 'block' ? 'none' : 'block';
        }

        function startTimer() {
            const mins = document.getElementById('timer-minutes').value;
            const timeVal = document.getElementById('timer-time').value;
            let targetMs = 0;

            if (mins) {
                targetMs = Date.now() + (parseInt(mins) * 60000);
            } else if (timeVal) {
                const now = new Date();
                const [h, m] = timeVal.split(':');
                const targetDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
                if (targetDate.getTime() < now.getTime()) {
                    targetDate.setDate(targetDate.getDate() + 1);
                }
                targetMs = targetDate.getTime();
            } else return;

            config.timerTarget = targetMs;
            config.timerTotalMs = targetMs - Date.now(); // プログレスバー用の総時間を記録
            saveConfig();
            
            document.getElementById('timer-setup').style.display = 'none';
            document.getElementById('timer-text-container').classList.remove('timer-finished');
            
            triggerCurtain('timer-display-area', () => { 
                document.getElementById('timer-progress-bg').style.display = 'block';
                runTimerLogic(); 
            });
        }

        function stopTimer() {
            config.timerTarget = null;
            config.timerTotalMs = 0;
            saveConfig();
            clearInterval(timerInterval);
            
            triggerCurtain('timer-display-area', () => {
                document.getElementById('timer-text-container').innerText = ""; 
                document.getElementById('timer-text-container').classList.remove('timer-finished');
                document.getElementById('timer-progress-bg').style.display = 'none';
            });
            document.getElementById('timer-setup').style.display = 'none';
        }

        function runTimerLogic() {
            clearInterval(timerInterval);
            const textContainer = document.getElementById('timer-text-container');
            const progressFill = document.getElementById('timer-progress-fill');
            
            timerInterval = setInterval(() => {
                if (!config.timerTarget) return;

                const diff = config.timerTarget - Date.now();
                
                if (diff <= 0) {
                    textContainer.innerText = "TIME'S UP!";
                    textContainer.classList.add('timer-finished'); // 発光アニメーション開始
                    progressFill.style.width = "0%";
                    clearInterval(timerInterval);
                    config.timerTarget = null;
                    saveConfig();
                } else {
                    // テキストの更新
                    const h = Math.floor(diff / (1000 * 60 * 60));
                    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((diff % (1000 * 60)) / 1000);
                    let text = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                    if(h > 0) text = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                    textContainer.innerText = text;

                    // プログレスバーの更新（残りの割合を計算）
                    let percentage = 0;
                    if(config.timerTotalMs > 0) {
                        percentage = Math.max(0, (diff / config.timerTotalMs) * 100);
                    }
                    progressFill.style.width = `${percentage}%`;
                }
            }, 1000);
        }

        /* ==================== News ==================== */
        async function fetchNews() {
            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(config.rssUrl)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");
                
                newsList = [];
                for (let i = 0; i < Math.min(items.length, 15); i++) {
                    newsList.push({
                        title: items[i].querySelector("title").textContent,
                        link: items[i].querySelector("link").textContent
                    });
                }
            } catch (error) {
                newsList = [{ title: "ニュースの読み込みに失敗しました。", link: "" }];
            }
        }

        function cycleNews() {
            if (newsList.length === 0) return;
            triggerCurtain('news-widget', () => {
                const currentNews = newsList[newsIndex];
                document.getElementById('news-text').innerText = currentNews.title;
                
                const qrContainer = document.getElementById('news-qr-container');
                const qrImg = document.getElementById('news-qr-img');
                
                if (currentNews.link) {
                    qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(currentNews.link)}`;
                    qrContainer.style.visibility = 'visible';
                } else {
                    qrContainer.style.visibility = 'hidden';
                }

                newsIndex = (newsIndex + 1) % newsList.length;
            });
        }

        /* ==================== Weather ==================== */
        async function fetchWeather() {
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${config.lat}&longitude=${config.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&current_weather=true&timezone=Asia%2FTokyo`;
                const response = await fetch(url);
                weatherData = await response.json();
            } catch (error) {}
        }

        function wCodeToJa(code) {
            if(code <= 3) return "晴れ / 曇り";
            if(code <= 49) return "霧";
            if(code <= 55) return "霧雨";
            if(code <= 69) return "雨";
            if(code <= 79) return "雪";
            if(code <= 82) return "にわか雨";
            if(code <= 99) return "雷雨";
            return "不明";
        }

        function getDayOfWeek(dateString) {
            const date = new Date(dateString);
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            return days[date.getDay()];
        }

        function cycleWeather() {
            if (!weatherData) return;
            
            triggerCurtain('weather-widget', () => {
                const content = document.getElementById('weather-content');
                
                if (weatherMode === 0) {
                    const cw = weatherData.current_weather;
                    content.innerHTML = `
                        <div style="font-size: 1.5rem; color: #ddd; margin-bottom: 5px;">現在の天気</div>
                        <div style="display: flex; align-items: baseline; justify-content: center; gap: 20px;">
                            <span style="font-size: 4rem;">${cw.temperature}<span style="font-size: 2rem;">°C</span></span>
                            <span style="font-size: 2rem; color: #fff;">${wCodeToJa(cw.weathercode)}</span>
                        </div>`;
                } else if (weatherMode === 1) {
                    const daily = weatherData.daily;
                    let html = `<div style="font-size: 1.2rem; color: #ddd; margin-bottom: 10px;">明日から5日間の予報</div>
                                <div class="forecast-container">`;
                    
                    for (let i = 1; i <= 5; i++) {
                        if(!daily.time[i]) break;
                        const dayStr = getDayOfWeek(daily.time[i]);
                        const wStr = wCodeToJa(daily.weathercode[i]).split(' ')[0]; 
                        
                        html += `
                            <div class="forecast-item">
                                <span style="font-size: 1.2rem; color: #ccc;">${dayStr}</span>
                                <span style="font-size: 1.2rem; margin: 5px 0;">${wStr}</span>
                                <span style="font-size: 1.4rem;">
                                    <span style="color:#ff6b6b">${Math.round(daily.temperature_2m_max[i])}°</span> / 
                                    <span style="color:#4dabf7">${Math.round(daily.temperature_2m_min[i])}°</span>
                                </span>
                            </div>`;
                    }
                    html += `</div>`;
                    content.innerHTML = html;

                } else {
                    const cw = weatherData.current_weather;
                    content.innerHTML = `
                        <div style="font-size: 1.5rem; color: #ddd; margin-bottom: 10px;">気象情報・注意報</div>
                        <span style="font-size: 2rem;" class="highlight">現在の風速: ${cw.windspeed} km/h</span><br>
                        <span style="font-size: 1.2rem; color: #ccc;">特別な気象警報は発令されていません</span>`;
                }
                
                weatherMode = (weatherMode + 1) % 3;
            });
        }

        /* ==================== Settings ==================== */
        function openSettings() {
            document.getElementById('set-color').value = config.mainColor;
            document.getElementById('set-bg-url').value = config.bgUrl || '';
            document.getElementById('set-rss').value = config.rssUrl;
            document.getElementById('set-lat').value = config.lat;
            document.getElementById('set-lon').value = config.lon;
            document.getElementById('set-event-name').value = config.eventName || '';
            document.getElementById('set-event-date').value = config.eventDate || '';
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
        }

        function saveSettings() {
            config.mainColor = document.getElementById('set-color').value;
            config.bgUrl = document.getElementById('set-bg-url').value;
            config.rssUrl = document.getElementById('set-rss').value;
            config.lat = parseFloat(document.getElementById('set-lat').value);
            config.lon = parseFloat(document.getElementById('set-lon').value);
            config.eventName = document.getElementById('set-event-name').value;
            config.eventDate = document.getElementById('set-event-date').value;

            saveConfig();
            applyConfig();
            closeSettings();
            
            updateCalendar();
            fetchWeather().then(cycleWeather);
            fetchNews().then(cycleNews);
        }

        function resetAll() {
            if(confirm("すべての設定とデータを初期化しますか？")) {
                localStorage.removeItem('smartDisplaySettingsV4');
                location.reload(); 
            }
        }

        /* ==================== Initialization ==================== */
        window.onload = async () => {
            loadConfig();
            updateClock();
            updateCalendar();
            
            triggerCurtain('clock-widget');
            triggerCurtain('calendar-widget');
            
            await fetchNews();
            await fetchWeather();
            
            cycleNews();
            cycleWeather();
            
            if (config.timerTarget && config.timerTarget > Date.now()) {
                document.getElementById('timer-progress-bg').style.display = 'block';
                runTimerLogic();
            }

            setInterval(cycleWeather, 30000); 
            setInterval(cycleNews, 60000);    
            setInterval(fetchWeather, 5 * 60 * 1000); 
            setInterval(fetchNews, 5 * 60 * 1000);    
        };
    </script>
</body>
</html>
