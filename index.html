<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SmartDisplay">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0b132b">
    <link rel="manifest" href='data:application/manifest+json;charset=utf-8,{"name":"Smart Display","short_name":"Display","display":"standalone","background_color":"#0b132b","theme_color":"#0b132b","start_url":"."}'>
    
    <title>Modern Smart Display V7</title>
    <style>
        @font-face { font-family: 'WRCCleanBold'; src: url('WRCCleanBold.ttf') format('truetype'); font-weight: bold; font-style: normal; }
        @font-face { font-family: 'GenEiLateGop_v2'; src: url('GenEiLateGoP_v2.ttf') format('truetype'); font-weight: normal; font-style: normal; }

        :root { --bg-color: #0b132b; --main-color: #ff8c00; --font-main: 'WRCCleanBold', 'GenEiLateGop_v2', sans-serif; }

        body {
            margin: 0; padding: 0; background: radial-gradient(circle at top left, #1a2a50, var(--bg-color));
            background-size: cover; background-position: center; background-repeat: no-repeat;
            color: #ffffff; font-family: var(--font-main); overflow: hidden; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: space-between;
            text-shadow: 0px 2px 10px rgba(0,0,0,0.5); user-select: none; -webkit-user-select: none;
        }

        .curtain-container { position: relative; overflow: hidden; border-radius: inherit; }
        .curtain { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--main-color); z-index: 50; transform: translateX(-101%); }
        @keyframes sweep { 0% { transform: translateX(-101%); } 40% { transform: translateX(0); } 60% { transform: translateX(0); } 100% { transform: translateX(101%); } }

        .widget-card {
            background: rgba(10, 15, 30, 0.4); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px; padding: 2vw; position: relative;
            display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }

        .widget-title { position: absolute; top: 20px; left: 25px; font-size: 1rem; color: rgba(255, 255, 255, 0.6); text-transform: uppercase; letter-spacing: 2px; font-weight: bold; font-family: 'WRCCleanBold', sans-serif; text-shadow: none; display: flex; gap: 10px; }
        #weather-title-city { font-family: 'GenEiLateGop_v2', sans-serif; color: var(--main-color); }

        .header { padding: 2vw 4vw 1vw 4vw; display: flex; justify-content: space-between; align-items: stretch; gap: 3vw; height: 25vh; box-sizing: border-box; }
        #clock-widget { flex: 0 0 auto; display: flex; flex-direction: column; justify-content: center; }
        .time-large { font-size: 7.5rem; line-height: 0.85; margin: 0; letter-spacing: -2px; }
        .date-small { font-size: 1.5rem; color: var(--main-color); margin: 15px 0 0 5px; text-transform: uppercase; letter-spacing: 2px; }

        #weather-widget { flex: 1; text-align: center; }
        #weather-content { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .forecast-container { display: flex; justify-content: space-between; width: 90%; margin-top: 10px; }
        .forecast-item { display: flex; flex-direction: column; align-items: center; }

        .widgets-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 3vw; padding: 0 4vw; height: 40vh; box-sizing: border-box; }
        .widget-content { font-size: 2rem; line-height: 1.4; width: 100%; text-align: center; }

        #news-content { display: flex; align-items: flex-start; justify-content: space-between; width: 100%; height: 100%; padding: 25px 20px 10px 20px; box-sizing: border-box; text-align: left; gap: 20px; }
        #news-text-area { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; height: 100%; overflow: hidden; padding-top: 10px; }
        
        /* ニュースのタイトルと本文の調整 */
        .news-headline { font-size: 1.8rem; color: var(--main-color); font-weight: bold; margin-bottom: 8px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .news-desc { font-size: 1.1rem; color: #ddd; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
        
        #news-qr-container { width: 150px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.9); padding: 10px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-shadow: none; color: #000; align-self: center; }
        #news-qr-container img { width: 130px; height: 130px; border-radius: 5px; }
        #news-qr-container span { font-size: 0.8rem; margin-top: 8px; font-family: 'GenEiLateGop_v2', sans-serif; font-weight: bold; }

        .highlight { color: var(--main-color); }
        .footer { padding: 1vw 4vw 2vw 4vw; display: flex; justify-content: space-between; align-items: flex-end; height: 17vh; box-sizing: border-box; }

        #timer-display-area { visibility: hidden; border-radius: 24px; height: 130px; display: flex; align-items: center; transition: width 0.3s ease; box-sizing: border-box; background: transparent; border-color: transparent; box-shadow: none; backdrop-filter: none; }
        #timer-content-wrapper { display: flex; width: 100%; align-items: center; opacity: 0; padding-top: 20px; }
        #timer-left { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        #timer-text-container { font-size: 4.5rem; color: var(--main-color); line-height: 1; margin-bottom: 10px; text-align: center; }
        #timer-progress-bg { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.2); border-radius: 3px; overflow: hidden; }
        #timer-progress-fill { height: 100%; width: 100%; background: var(--main-color); transition: width 1s linear; box-shadow: 0 0 10px var(--main-color); }
        #timer-right { display: none; flex: 1; flex-direction: column; justify-content: center; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 20px; margin-left: 20px; }
        #timer-next-label { font-size: 0.9rem; color: rgba(255,255,255,0.6); letter-spacing: 2px; font-family: 'WRCCleanBold', sans-serif; }
        #timer-next-text { font-size: 1.5rem; font-family: 'GenEiLateGop_v2', sans-serif; margin-top: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        @keyframes pulseGlow { 0% { text-shadow: 0 0 10px var(--main-color); opacity: 1; } 50% { text-shadow: 0 0 40px var(--main-color), 0 0 20px #fff; opacity: 0.8; transform: scale(1.02); } 100% { text-shadow: 0 0 10px var(--main-color); opacity: 1; } }
        .timer-finished { animation: pulseGlow 1.5s infinite ease-in-out; color: #fff !important; }

        .controls { display: flex; gap: 15px; position: relative; }
        button { background-color: rgba(0, 0, 0, 0.5); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.3); padding: 12px 24px; font-size: 1.1rem; border-radius: 50px; cursor: pointer; font-family: inherit; transition: all 0.3s ease; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
        button:hover { background-color: var(--main-color); border-color: var(--main-color); color: var(--bg-color); }
        .btn-primary { background-color: var(--main-color); border-color: var(--main-color); color: var(--bg-color); }

        .glass-modal { background: rgba(11, 19, 43, 0.85); border: 1px solid var(--main-color); border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        #timer-setup { display: none; position: absolute; bottom: 70px; right: 0; padding: 25px; min-width: 280px; z-index: 101; }
        .timer-row { margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; width: 100%; }
        input[type="number"], input[type="time"], input[type="text"], input[type="datetime-local"] { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); color: white; padding: 10px; border-radius: 8px; font-family: inherit; font-size: 1rem; width: 100%; box-sizing: border-box; }
        input[type="number"] { width: 80px; }
        input:focus { outline: none; border-color: var(--main-color); }

        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
        .settings-content { padding: 40px; border-top: 4px solid var(--main-color); width: 80%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
        .settings-content h2 { margin-top: 0; font-weight: normal; }
        .settings-content label { display: block; margin-top: 20px; color: rgba(255, 255, 255, 0.8); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .settings-content input { margin-top: 8px; }
        .settings-actions { margin-top: 40px; display: flex; justify-content: space-between; }
        .btn-danger { border-color: #ff4444; color: #ff4444; }
        .btn-danger:hover { background-color: #ff4444; color: white; }
        .file-upload-wrapper { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .file-upload-wrapper input[type="file"] { border: none; background: none; padding: 0; font-family: inherit; }
    </style>
</head>
<body>

    <div class="header">
        <div id="clock-widget">
            <div id="clock-content">
                <p class="time-large" id="time-text">00:00:00</p>
                <p class="date-small" id="date-text">Month 00, YYYY (Day)</p>
            </div>
        </div>
        <div id="weather-widget" class="widget-card curtain-container">
            <div class="widget-title">Weather <span id="weather-title-city"></span></div>
            <div class="curtain"></div>
            <div id="weather-content">取得中...</div>
        </div>
    </div>

    <div class="widgets-grid">
        <div id="calendar-widget" class="widget-card curtain-container">
            <div class="widget-title">Calendar</div>
            <div class="curtain"></div>
            <div id="calendar-content" class="widget-content">Loading...</div>
        </div>
        <div id="news-widget" class="widget-card curtain-container">
            <div class="widget-title">News</div>
            <div class="curtain"></div>
            <div id="news-content">
                <div id="news-text-area">
                    <div class="news-headline" id="news-headline">ニュースを取得中...</div>
                    <div class="news-desc" id="news-desc"></div>
                </div>
                <div id="news-qr-container" style="visibility: hidden;">
                    <img id="news-qr-img" src="" alt="QR Code">
                    <span>続きはQRコードで</span>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div id="timer-display-area" class="curtain-container">
            <div class="widget-title" id="timer-title" style="display: none;">TIMER</div>
            <div class="curtain" id="timer-curtain"></div>
            <div id="timer-content-wrapper">
                <div id="timer-left">
                    <div id="timer-text-container"></div>
                    <div id="timer-progress-bg">
                        <div id="timer-progress-fill"></div>
                    </div>
                </div>
                <div id="timer-right">
                    <div id="timer-next-label">COMING UP NEXT</div>
                    <div id="timer-next-text"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <div id="timer-setup" class="glass-modal">
                <div class="timer-row">
                    <input type="number" id="timer-minutes" placeholder="0"> 
                    <span style="white-space: nowrap; margin-left: 10px;">分 (Mins)</span>
                </div>
                <div class="timer-row" style="justify-content: center; font-size: 0.9rem; color: #888;">
                    - または時刻指定 -
                </div>
                <div class="timer-row">
                    <input type="time" id="timer-time">
                </div>
                <div class="timer-row" style="margin-top: 15px;">
                    <input type="text" id="timer-next-task" placeholder="次にやること (任意)">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn-primary" onclick="startTimer()" style="flex:1;">Start</button>
                    <button class="btn-danger" onclick="stopTimer()" style="flex:1;">Stop</button>
                </div>
            </div>
            <button onclick="toggleTimerSetup()">Timer</button>
            <button onclick="openSettings()">Settings</button>
        </div>
    </div>

    <div id="settings-modal">
        <div class="settings-content glass-modal">
            <h2><span class="highlight">System</span> Settings</h2>
            
            <label>Main Theme Color</label>
            <input type="color" id="set-color" value="#ff8c00" style="height: 40px; padding: 0; border: none; background: none; cursor: pointer;">

            <label>背景画像 (URLで指定)</label>
            <input type="text" id="set-bg-url" placeholder="https://example.com/image.jpg" style="width: 100%;">
            
            <label>背景画像 (端末からアップロード)</label>
            <div class="file-upload-wrapper">
                <input type="file" id="set-bg-file" accept="image/*">
                <span style="font-size: 0.8rem; color: #aaa;">(自動で圧縮保存されます)</span>
            </div>

            <label>News RSS URL</label>
            <input type="text" id="set-rss" value="https://news.yahoo.co.jp/rss/topics/top-picks.xml" style="width: 100%;">

            <div style="display: flex; gap: 20px;">
                <div style="flex: 1;">
                    <label>Weather Latitude (緯度)</label>
                    <input type="number" id="set-lat" step="0.0001" value="35.6895" style="width: 100%;">
                </div>
                <div style="flex: 1;">
                    <label>Weather Longitude (経度)</label>
                    <input type="number" id="set-lon" step="0.0001" value="139.6917" style="width: 100%;">
                </div>
            </div>

            <p style="font-size: 0.8rem; color: #aaa; margin-top: 5px;">※天気の地域名は緯度・経度から自動的に取得されます。</p>

            <label>Countdown Event Name (予定名)</label>
            <input type="text" id="set-event-name" placeholder="例: 東京旅行" style="width: 100%;">

            <label>Countdown Event Date & Time (日時)</label>
            <input type="datetime-local" id="set-event-date" style="width: 100%;">

            <div class="settings-actions">
                <button class="btn-danger" onclick="resetAll()">全設定リセット</button>
                <div style="display: flex; gap: 10px;">
                    <button onclick="closeSettings()">Cancel</button>
                    <button class="btn-primary" onclick="saveSettings()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const defaultSettings = {
            mainColor: '#ff8c00', bgUrl: '', 
            rssUrl: 'https://news.yahoo.co.jp/rss/topics/top-picks.xml',
            lat: 35.6895, lon: 139.6917, cityName: '東京',
            eventName: '', eventDate: '',
            timerTarget: null, timerTotalMs: 0, nextTask: ''
        };

        let config = { ...defaultSettings };
        let newsList = []; let weatherData = null; let weatherMode = 0; let newsIndex = 0;

        function loadConfig() {
            const saved = localStorage.getItem('smartDisplaySettingsV7');
            if (saved) config = { ...config, ...JSON.parse(saved) };
            applyConfig();
        }

        function saveConfig() { localStorage.setItem('smartDisplaySettingsV7', JSON.stringify(config)); }

        function applyConfig() {
            document.documentElement.style.setProperty('--main-color', config.mainColor);
            if (config.bgUrl) document.body.style.backgroundImage = `url('${config.bgUrl}')`;
            else document.body.style.backgroundImage = ''; 
            document.getElementById('weather-title-city').innerText = `- ${config.cityName}`;
        }

        // 緯度・経度から市区町村名を逆ジオコーディングで自動取得
        async function fetchCityNameFromCoords(lat, lon) {
            try {
                // クライアントサイド向けの無料逆ジオコーディングAPIを利用
                const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ja`);
                const data = await res.json();
                return data.locality || data.city || data.principalSubdivision || "現在地";
            } catch (e) {
                return "取得失敗";
            }
        }

        document.getElementById('set-bg-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    let width = img.width, height = img.height;
                    const MAX_WIDTH = 1920, MAX_HEIGHT = 1080;
                    if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                    else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    document.getElementById('set-bg-url').value = canvas.toDataURL('image/jpeg', 0.8);
                }
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function triggerCurtain(containerId, updateFunction) {
            const container = document.getElementById(containerId);
            const curtain = container.querySelector('.curtain');
            curtain.style.animation = 'none'; void curtain.offsetWidth; 
            curtain.style.animation = 'sweep 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards';
            setTimeout(() => { if(updateFunction) updateFunction(); }, 550);
        }

        /* ==================== Clock & Calendar ==================== */
        function updateClock() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0'), mm = String(now.getMinutes()).padStart(2, '0'), ss = String(now.getSeconds()).padStart(2, '0');
            const dateString = now.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('time-text').innerText = `${hh}:${mm}:${ss}`;
            document.getElementById('date-text').innerText = dateString;
        }
        setInterval(updateClock, 1000);

        function updateCalendar() {
            const content = document.getElementById('calendar-content');
            if (!config.eventDate || !config.eventName) { content.innerHTML = `<span style="font-size: 1.5rem; color: #ccc;">予定がありません</span>`; return; }
            const diff = new Date(config.eventDate).getTime() - Date.now();
            if (diff > 0) {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24)), h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                content.innerHTML = `<div style="font-size: 1.2rem; margin-bottom: 15px; color: #ddd;"><span class="highlight" style="font-size: 1.8rem;">${config.eventName}</span> まで</div><div style="font-size: 3.5rem; font-family: 'WRCCleanBold';">${d} <span style="font-size: 1.5rem; color: #ccc; font-family: 'GenEiLateGop_v2';">日</span> ${h} <span style="font-size: 1.5rem; color: #ccc; font-family: 'GenEiLateGop_v2';">時間</span></div>`;
            } else {
                content.innerHTML = `<span class="highlight" style="font-size: 2rem;">${config.eventName}</span><br><span style="font-size: 1.5rem;">時間が来ました！</span>`;
            }
        }
        setInterval(updateCalendar, 1000 * 60 * 60);

        /* ==================== Timer ==================== */
        let timerInterval;
        function toggleTimerSetup() {
            const setup = document.getElementById('timer-setup');
            setup.style.display = setup.style.display === 'block' ? 'none' : 'block';
        }

        function triggerCurtainTimer(isStarting, callback) {
            const container = document.getElementById('timer-display-area');
            const curtain = document.getElementById('timer-curtain');
            const wrapper = document.getElementById('timer-content-wrapper');
            const title = document.getElementById('timer-title');
            
            container.style.visibility = 'visible';
            curtain.style.animation = 'none'; void curtain.offsetWidth; 
            curtain.style.animation = 'sweep 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards';
            
            setTimeout(() => {
                if (isStarting) {
                    container.classList.add('widget-card');
                    container.style.padding = "1vw 3vw"; container.style.background = ""; container.style.borderColor = ""; container.style.boxShadow = ""; container.style.backdropFilter = "";
                    title.style.display = 'block'; wrapper.style.opacity = '1';
                } else {
                    container.style.background = 'transparent'; container.style.borderColor = 'transparent'; container.style.boxShadow = 'none'; container.style.backdropFilter = 'none';
                    title.style.display = 'none'; wrapper.style.opacity = '0';
                }
                if(callback) callback();
            }, 550);

            if (!isStarting) { setTimeout(() => { container.style.visibility = 'hidden'; container.classList.remove('widget-card'); }, 1200); }
        }

        function setupTimerUIState() {
            const rightPanel = document.getElementById('timer-right'), nextText = document.getElementById('timer-next-text'), container = document.getElementById('timer-display-area');
            if (config.nextTask && config.nextTask.trim() !== '') {
                nextText.innerText = config.nextTask; rightPanel.style.display = 'flex'; container.style.width = '700px';
            } else { rightPanel.style.display = 'none'; container.style.width = '350px'; }
        }

        function startTimer() {
            const mins = document.getElementById('timer-minutes').value, timeVal = document.getElementById('timer-time').value, nextTask = document.getElementById('timer-next-task').value;
            let targetMs = 0;
            if (mins) { targetMs = Date.now() + (parseInt(mins) * 60000); }
            else if (timeVal) {
                const now = new Date(), [h, m] = timeVal.split(':');
                const targetDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
                if (targetDate.getTime() < now.getTime()) targetDate.setDate(targetDate.getDate() + 1);
                targetMs = targetDate.getTime();
            } else return;

            config.timerTarget = targetMs; config.timerTotalMs = targetMs - Date.now(); config.nextTask = nextTask; saveConfig();
            document.getElementById('timer-setup').style.display = 'none'; document.getElementById('timer-text-container').classList.remove('timer-finished');
            triggerCurtainTimer(true, () => { setupTimerUIState(); updateTimerUI(); runTimerLogic(); });
        }

        function stopTimer() {
            config.timerTarget = null; config.timerTotalMs = 0; config.nextTask = ''; saveConfig(); clearInterval(timerInterval);
            document.getElementById('timer-setup').style.display = 'none';
            triggerCurtainTimer(false, () => { document.getElementById('timer-text-container').innerText = ""; document.getElementById('timer-text-container').classList.remove('timer-finished'); });
        }

        function updateTimerUI() {
            if (!config.timerTarget) return;
            const diff = config.timerTarget - Date.now();
            const textContainer = document.getElementById('timer-text-container'), progressFill = document.getElementById('timer-progress-fill');
            if (diff <= 0) {
                textContainer.innerText = "TIME'S UP!"; textContainer.classList.add('timer-finished'); progressFill.style.width = "0%";
                clearInterval(timerInterval); config.timerTarget = null; saveConfig();
            } else {
                const h = Math.floor(diff / (1000 * 60 * 60)), m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)), s = Math.floor((diff % (1000 * 60)) / 1000);
                textContainer.innerText = h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                progressFill.style.width = `${Math.max(0, (diff / config.timerTotalMs) * 100)}%`;
            }
        }
        function runTimerLogic() { clearInterval(timerInterval); timerInterval = setInterval(updateTimerUI, 1000); }
        function checkAndResumeTimer() {
            if (config.timerTarget) {
                if (config.timerTarget > Date.now()) { triggerCurtainTimer(true, () => { setupTimerUIState(); updateTimerUI(); runTimerLogic(); }); } 
                else { triggerCurtainTimer(true, () => { setupTimerUIState(); updateTimerUI(); }); }
            }
        }

        /* ==================== News ==================== */
        async function fetchNews() {
            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(config.rssUrl)}`);
                const data = await response.json();
                const items = new DOMParser().parseFromString(data.contents, "text/xml").querySelectorAll("item");
                newsList = [];
                for (let i = 0; i < Math.min(items.length, 15); i++) {
                    const title = items[i].querySelector("title")?.textContent || "", link = items[i].querySelector("link")?.textContent || "";
                    let desc = items[i].querySelector("description")?.textContent || "";
                    desc = desc.replace(/(<([^>]+)>)/gi, "").trim();
                    newsList.push({ title, link, desc });
                }
            } catch (error) { newsList = [{ title: "ニュース取得失敗", link: "", desc: "通信を確認してください。" }]; }
        }
        function cycleNews() {
            if (newsList.length === 0) return;
            triggerCurtain('news-widget', () => {
                const current = newsList[newsIndex];
                document.getElementById('news-headline').innerText = current.title;
                
                // 本文を100文字に制限（超える場合は「...」を付与）
                let truncatedDesc = current.desc;
                if (truncatedDesc.length > 100) {
                    truncatedDesc = truncatedDesc.substring(0, 100) + '...';
                }
                document.getElementById('news-desc').innerText = truncatedDesc;
                
                const qrContainer = document.getElementById('news-qr-container');
                if (current.link) { document.getElementById('news-qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(current.link)}`; qrContainer.style.visibility = 'visible'; } 
                else qrContainer.style.visibility = 'hidden';
                newsIndex = (newsIndex + 1) % newsList.length;
            });
        }

        /* ==================== Weather ==================== */
        async function fetchWeather() {
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${config.lat}&longitude=${config.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&current_weather=true&timezone=Asia%2FTokyo`;
                weatherData = await (await fetch(url)).json();
            } catch (error) {}
        }
        function wCodeToJa(code) {
            if(code <= 3) return "晴/曇"; if(code <= 49) return "霧"; if(code <= 55) return "霧雨"; if(code <= 69) return "雨";
            if(code <= 79) return "雪"; if(code <= 82) return "にわか雨"; if(code <= 99) return "雷雨"; return "不明";
        }
        function cycleWeather() {
            if (!weatherData) return;
            triggerCurtain('weather-widget', () => {
                const content = document.getElementById('weather-content'), cw = weatherData.current_weather;
                if (weatherMode === 0) {
                    content.innerHTML = `<div style="font-size: 1.5rem; color: #ddd; margin-bottom: 5px;">現在の天気</div><div style="display: flex; align-items: baseline; justify-content: center; gap: 20px;"><span style="font-size: 4rem;">${cw.temperature}<span style="font-size: 2rem;">°C</span></span><span style="font-size: 2rem; color: #fff;">${wCodeToJa(cw.weathercode)}</span></div>`;
                } else if (weatherMode === 1) {
                    let html = `<div style="font-size: 1.2rem; color: #ddd; margin-bottom: 10px;">明日から5日間の予報</div><div class="forecast-container">`;
                    for (let i = 1; i <= 5; i++) {
                        if(!weatherData.daily.time[i]) break;
                        html += `<div class="forecast-item"><span style="font-size: 1.2rem; color: #ccc;">${['日', '月', '火', '水', '木', '金', '土'][new Date(weatherData.daily.time[i]).getDay()]}</span><span style="font-size: 1.2rem; margin: 5px 0;">${wCodeToJa(weatherData.daily.weathercode[i]).split(' ')[0]}</span><span style="font-size: 1.4rem;"><span style="color:#ff6b6b">${Math.round(weatherData.daily.temperature_2m_max[i])}°</span> / <span style="color:#4dabf7">${Math.round(weatherData.daily.temperature_2m_min[i])}°</span></span></div>`;
                    }
                    content.innerHTML = html + `</div>`;
                } else {
                    content.innerHTML = `<div style="font-size: 1.5rem; color: #ddd; margin-bottom: 10px;">気象情報・注意報</div><span style="font-size: 2rem;" class="highlight">現在の風速: ${cw.windspeed} km/h</span><br><span style="font-size: 1.2rem; color: #ccc;">特別な気象警報は発令されていません</span>`;
                }
                weatherMode = (weatherMode + 1) % 3;
            });
        }

        /* ==================== Settings ==================== */
        function openSettings() {
            document.getElementById('set-color').value = config.mainColor; document.getElementById('set-bg-url').value = config.bgUrl || '';
            document.getElementById('set-rss').value = config.rssUrl; document.getElementById('set-lat').value = config.lat; document.getElementById('set-lon').value = config.lon;
            document.getElementById('set-event-name').value = config.eventName || ''; document.getElementById('set-event-date').value = config.eventDate || '';
            document.getElementById('settings-modal').style.display = 'flex';
        }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        
        async function saveSettings() {
            config.mainColor = document.getElementById('set-color').value; 
            config.bgUrl = document.getElementById('set-bg-url').value;
            config.rssUrl = document.getElementById('set-rss').value; 
            
            // 緯度経度から自動で地名を取得
            const newLat = parseFloat(document.getElementById('set-lat').value);
            const newLon = parseFloat(document.getElementById('set-lon').value);
            
            // もし緯度経度が変わっていたら（または初回）地名を取得し直す
            if(config.lat !== newLat || config.lon !== newLon || !config.cityName) {
                document.getElementById('weather-title-city').innerText = "- 取得中...";
                config.cityName = await fetchCityNameFromCoords(newLat, newLon);
            }
            
            config.lat = newLat;
            config.lon = newLon;
            
            config.eventName = document.getElementById('set-event-name').value; 
            config.eventDate = document.getElementById('set-event-date').value;
            
            saveConfig(); applyConfig(); closeSettings(); updateCalendar(); 
            fetchWeather().then(cycleWeather); fetchNews().then(cycleNews);
        }
        function resetAll() { if(confirm("初期化しますか？")) { localStorage.removeItem('smartDisplaySettingsV7'); location.reload(); } }

        /* ==================== Initialization ==================== */
        window.onload = async () => {
            loadConfig(); updateClock(); updateCalendar();
            document.getElementById('news-headline').innerText = "Loading..."; document.getElementById('weather-content').innerText = "Loading...";
            
            // 初回ロード時に地名が無い場合のフェールセーフ
            if(!config.cityName) {
                config.cityName = await fetchCityNameFromCoords(config.lat, config.lon);
                saveConfig();
                applyConfig();
            }

            await fetchNews(); await fetchWeather();
            cycleNews(); cycleWeather(); checkAndResumeTimer();
            setInterval(cycleWeather, 30000); setInterval(cycleNews, 60000); setInterval(fetchWeather, 5 * 60 * 1000); setInterval(fetchNews, 5 * 60 * 1000);    
        };
    </script>
</body>
</html>
